<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Members - LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">📚 Library Management System</div>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="books.html">Books</a>
        <a href="members.html" class="active">Members</a>
        <a href="borrow.html">Borrow / Return</a>
    </nav>
</div>

<div class="container">

    <div class="card">
        <h2>Add New Member</h2>
        <div id="memberAlert" class="alert"></div>
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Member name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Email address">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" placeholder="Phone number">
            </div>
        </div>
        <button class="btn btn-primary" onclick="addMember()">Add Member</button>
    </div>

    <div class="card">
        <h2>All Members</h2>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by name...">
            <button class="btn btn-primary" onclick="searchMembers()">Search</button>
            <button class="btn btn-success" onclick="loadMembers()">All</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Join Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="membersTable">
                <tr><td colspan="7" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="js/members.js"></script>
</body>
</html>
