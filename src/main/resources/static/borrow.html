<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow/Return - LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">📚 Library Management System</div>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="books.html">Books</a>
        <a href="members.html">Members</a>
        <a href="borrow.html" class="active">Borrow / Return</a>
    </nav>
</div>

<div class="container">

    <div class="card">
        <h2>Issue Book</h2>
        <div id="borrowAlert" class="alert"></div>
        <div class="form-grid">
            <div class="form-group">
                <label>Select Member</label>
                <select id="memberId">
                    <option value="">-- Select Member --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select Book</label>
                <select id="bookId">
                    <option value="">-- Select Book --</option>
                </select>
            </div>
        </div>
        <button class="btn btn-primary" onclick="issueBook()">Issue Book</button>
    </div>

    <div class="card">
        <h2>All Borrow Records</h2>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Book</th>
                    <th>Member</th>
                    <th>Borrow Date</th>
                    <th>Due Date</th>
                    <th>Return Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="borrowTable">
                <tr><td colspan="8" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="js/borrow.js"></script>
</body>
</html>
